/* Bundled M2 styles */
.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {
	-webkit-transition: -webkit-transform 0.3s ease-out, opacity 0.3s ease-in;
	-moz-transition: -moz-transform 0.3s ease-out, opacity 0.3s ease-in;
	-o-transition: -o-transform 0.3s ease-out, opacity 0.3s ease-in;
	transition: transform 0.3s ease-out, opacity 0.3s ease-in;
}

.leaflet-cluster-spider-leg {
	/* stroke-dashoffset (duration and function) should match with leaflet-marker-icon transform in order to track it exactly */
	-webkit-transition: -webkit-stroke-dashoffset 0.3s ease-out, -webkit-stroke-opacity 0.3s ease-in;
	-moz-transition: -moz-stroke-dashoffset 0.3s ease-out, -moz-stroke-opacity 0.3s ease-in;
	-o-transition: -o-stroke-dashoffset 0.3s ease-out, -o-stroke-opacity 0.3s ease-in;
	transition: stroke-dashoffset 0.3s ease-out, stroke-opacity 0.3s ease-in;
}

.marker-cluster-small {
	background-color: rgba(181, 226, 140, 0.6);
	}
.marker-cluster-small div {
	background-color: rgba(110, 204, 57, 0.6);
	}

.marker-cluster-medium {
	background-color: rgba(241, 211, 87, 0.6);
	}
.marker-cluster-medium div {
	background-color: rgba(240, 194, 12, 0.6);
	}

.marker-cluster-large {
	background-color: rgba(253, 156, 115, 0.6);
	}
.marker-cluster-large div {
	background-color: rgba(241, 128, 23, 0.6);
	}

	/* IE 6-8 fallback colors */
.leaflet-oldie .marker-cluster-small {
	background-color: rgb(181, 226, 140);
	}
.leaflet-oldie .marker-cluster-small div {
	background-color: rgb(110, 204, 57);
	}

.leaflet-oldie .marker-cluster-medium {
	background-color: rgb(241, 211, 87);
	}
.leaflet-oldie .marker-cluster-medium div {
	background-color: rgb(240, 194, 12);
	}

.leaflet-oldie .marker-cluster-large {
	background-color: rgb(253, 156, 115);
	}
.leaflet-oldie .marker-cluster-large div {
	background-color: rgb(241, 128, 23);
}

.marker-cluster {
	background-clip: padding-box;
	border-radius: 20px;
	}
.marker-cluster div {
	width: 30px;
	height: 30px;
	margin-left: 5px;
	margin-top: 5px;

	text-align: center;
	border-radius: 15px;
	font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
	}
.marker-cluster span {
	line-height: 30px;
	}

.plan-btn{width:100%;padding:11px;border:0;border-radius:12px;font-weight:1000;font-size:13px;cursor:pointer;margin-top:4px;background:#21262d;color:var(--text)}
.plan-btn.cta-blue{background:var(--accent);color:white}
.plan-btn.cta-green{background:#238636;color:white}
.billing-status-bar{display:flex;align-items:center;gap:8px;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.billing-pill{font-size:10px;font-weight:1000;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--green);color:white}

<body>
<div class="app">
<header class="topbar">
  <div class="logo">M2</div>
  <div class="title"><b id="brandTitle">BlockBoss CRM</b><span id="sessionLine">Original stack restored · Solar + HVAC + Field Team</span></div>
  <div class="top-actions">
    <div id="syncDot" class="sync-dot" title="Sync status"></div>
    <button class="pill-btn hide-sm" id="openLaunch">🚀 Launch</button>
    <button class="pill-btn blue" id="openLogin">Login</button>
    <button class="pill-btn gold" id="exportTop">Backup</button>
  </div>
</header>
<main class="main">
  <div id="map"></div>
  <button class="filter-toggle" id="filterToggle">Filter: All ▾</button>
  <div class="filter-bar" id="filterBar"></div>
  <div class="progress" id="progress"><div class="ttl" id="progTitle">Loading…</div><div class="sub" id="progSub">Starting</div><div class="track"><div class="fill" id="progFill"></div></div><button class="save-btn secondary" id="cancelLoad">Cancel</button></div>
  <div class="field-dock">
    <div class="field-tools">
      <button class="field-toggle" id="fieldToggle">⚡ Field Tools</button>
      <div class="field-menu" id="fieldMenu">
        <div class="field-menu-head"><b>Field Rep Tools</b><span>old-style clean menu</span></div>
        <div class="field-grid">
          <button class="gold" data-tool="today">⚡ Today Mode</button>
          <button class="green" data-tool="next">🎯 Next Best</button>
          <button class="blue" data-tool="locate">📍 Locate Me</button>
          <button data-tool="satellite">🛰️ Satellite</button>
          <button class="blue" data-tool="route">🗺️ Route Opt</button>
          <button data-tool="fit">🗺️ Fit Leads</button>
          <button class="purple" data-tool="add">➕ Add Lead</button>
          <button class="green" data-tool="loadArea">⬇ Load Area</button>
          <button data-tool="neighborhoods">📍 Hoods</button>
          <button class="gold" data-tool="livetrack">📡 Live Track</button>
          <button data-tool="clearroute">❌ Clear Route</button>
        </div>
      </div>
    </div>
    <button class="next-best-pill" id="nextBestPill">🎯 Next Best</button>
  </div>
  <div class="info-tag" id="infoTag">Live map is always on. Use Field Tools → Load Area for NYC PLUTO-style homeowner pins.</div>
  <section class="panel-view" id="listView"><div id="listContainer"></div></section>
  <section class="panel-view" id="statsView"></section>
</main>
<nav class="bottom-nav">
  <button class="nav-btn active" data-view="map"><span class="ico">🗺️</span>Map</button>
  <button class="nav-btn" data-view="list"><span class="ico">📋</span>Leads</button>
  <button class="nav-btn" data-view="stats"><span class="ico">📊</span>Stats</button>
</nav>
</div>

<div class="sheet" id="sheet"><div class="sheet-handle" id="sheetHandle"></div><div class="sheet-header"><div class="info"><h2 id="shName">—</h2><div class="addr" id="shAddr">—</div></div><button class="sheet-close" id="closeSheet">×</button></div><div class="sheet-body" id="sheetBody"></div></div>
<div class="login-overlay" id="loginOverlay"></div>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>

      if(!db.objectStoreNames.contains('leads'))db.createObjectStore('leads',{keyPath:'id'});

}

  const db=await openHybridDB();

}

// ── Offline Queue ─────────────────────────────────────────────────────────────
let offlineQueue = [];

function queueLead(l,error='') {

  markLeadSync(l,'queued',error);
  const item={id:l.id,lead:{...l},attempts:0,queued_at:new Date().toISOString(),last_error:String(error||'')};
  const i = offlineQueue.findIndex(x => (x.id||x.lead?.id) === l.id);

  const dot = document.getElementById('syncDot');
  if (dot) dot.title = offlineQueue.length + ' changes queued';
}
async function flushQueue() {
  if (!sb || !session().team_id || !offlineQueue.length) return;
  setSyncDot('busy');
  const q = [...offlineQueue]; offlineQueue = []; saveQueue();
  const failed = [];
  for (const item of q) {
    const l=item.lead||item;
    try {
      const { error }=await sb.from('leads').upsert(localToRemote(l), { onConflict:'local_id' });
      if(error)throw error; markLeadSync(state.leads.find(x=>x.id===l.id),'synced');

}

// ── Upsert Helpers ────────────────────────────────────────────────────────────
async function upsertLead(l) {

  }

async function upsertBatch(leads) {

// ── Realtime ──────────────────────────────────────────────────────────────────

    .on('postgres_changes', { event:'*', schema:'public', table:'leads', filter:`team_id=eq.${session().team_id}` }, p => {
      const row=p.eventType==='DELETE'?p.old:p.new;
      if (!row?.local_id) { if(p.eventType==='DELETE')syncFromSupabase(); return; }
      const l = remoteToLocal(row), idx = state.leads.findIndex(x => x.id === l.id);
      if (p.eventType === 'DELETE') state.leads = state.leads.filter(x => x.id !== l.id);

dark.addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

// ── Route Optimizer ───────────────────────────────────────────────────────────
function optimizeRoute() {
  const leads = filterLeads().filter(l => l.lat && l.lng && !['closed','not_interested','do_not_knock','not_qualified'].includes(l.status)).slice(0, 80);
  if (!leads.length) return toast('No leads to route');
  let cur = draftMarker ? draftMarker.getLatLng() : { lat:+leads[0].lat, lng:+leads[0].lng };

    let best = null, bd = Infinity;
    remaining.forEach(l => { const d = Math.hypot(+l.lat - cur.lat, +l.lng - cur.lng); if (d < bd) { bd = d; best = l; } });
    route.push(best); remaining = remaining.filter(l => l.id !== best.id); cur = { lat:+best.lat, lng:+best.lng };
  }
  clearRoute();
  const pts = [];
  route.forEach((l, i) => {
    const html = `<div style="background:#1f6feb;color:white;font-size:9px;font-weight:900;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)">${i+1}</div>`;
    const m = L.marker([+l.lat, +l.lng], { icon:L.divIcon({className:'',html,iconSize:[22,22],iconAnchor:[11,11]}), zIndexOffset:300 }).addTo(map);
    m.on('click', () => openLead(l.id)); routeMarkers.push(m); pts.push([+l.lat, +l.lng]);
  });
  routePolyline = L.polyline(pts, { color:'#58a6ff', weight:2, opacity:.45, dashArray:'6,9' }).addTo(map);
  map.fitBounds(L.latLngBounds(pts).pad(.1));
  toast(`✓ Route: ${route.length} stops`);
  document.getElementById('fieldMenu').classList.remove('open');
}
function clearRoute() {
  routeMarkers.forEach(m => map.removeLayer(m)); routeMarkers = [];
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
}

// ── Field Tools ───────────────────────────────────────────────────────────────
function toggleSatellite() {
  satellite = !satellite;
  if (satellite) { map.removeLayer(dark); sat.addTo(map); labels.addTo(map); }
  else { map.removeLayer(sat); map.removeLayer(labels); dark.addTo(map); }
  renderMarkers(); toast(satellite ? 'Satellite on' : 'Satellite off');
}
function locate() {
  navigator.geolocation?.getCurrentPosition(p => {
    map.setView([p.coords.latitude, p.coords.longitude], 18);
    if (draftMarker) draftMarker.remove();
    draftMarker = L.marker([p.coords.latitude, p.coords.longitude], { icon:L.divIcon({ className:'', html:`<div class="dot-pin dot-cold dot-selected"></div>`, iconSize:[34,34], iconAnchor:[17,17] }) }).addTo(map);
    toast('✓ Location found');
  }, e => toast('GPS unavailable: ' + e.message), { enableHighAccuracy:true, timeout:10000 });
}
function fitLeads() {
  const arr = filterLeads().filter(l => l.lat && l.lng);
  if (!arr.length) return toast('No visible leads');
  map.fitBounds(L.latLngBounds(arr.map(l => [+l.lat, +l.lng])).pad(.18));
  toast('✓ Fit visible leads');
}

// ── Label Visibility (zoom-based) ─────────────────────────────────────────────
function updateLabelViz() { document.getElementById('map').classList.toggle('show-prop-labels', map.getZoom() >= 17); }

</script>

function buildBoard(rows) {
  const b = {};

    if (['knocked','not_home','interested','callback','set','sat','closed'].includes(l.status)) b[a].doors++;
    if (['set','sat'].includes(l.status)) b[a].sets++;
    if (l.status === 'closed') b[a].closes++;
  });
  return Object.entries(b).sort((a, b) => b[1].closes - a[1].closes || b[1].sets - a[1].sets || b[1].doors - a[1].doors);
}

// ── Import / Export ───────────────────────────────────────────────────────────
function exportBackup() {
  const payload = { app:'BlockBoss CRM', version:'original_stack_restored', exported_at:new Date().toISOString(), state, settings:settings(), account:account(), session:session(), customer_accounts:subs(), contact:contact() };
  const arr = JSON.parse(localStorage.getItem(BACKUPS) || '[]');
  arr.unshift(payload); localStorage.setItem(BACKUPS, JSON.stringify(arr.slice(0, 6)));
  download('blockboss-crm-full-backup-' + new Date().toISOString().slice(0,10) + '.json', payload);
  toast('✓ Full backup exported');
}
function exportCSV() {
  const headers = ['Name','Address','Borough','Status','Phone','Email','Bill ($)','Sun Score','Rep','Territory','Year Built','Updated','Notes'];
  const rows = state.leads.map(l => [nameOf(l),l.addr||'',l.boro||l.borough||'',l.status||'',l.phone||'',l.email||'',l.monthly_bill||'',l.sun_score||'',l.assigned_agent||'',l.territory||'',l.yearbuilt||'',(l.updated_at||'').slice(0,10),(l.notes||'').replace(/[\r\n,]+/g,' ')].map(v => '"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = 'm2-leads-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('✓ Exported ' + state.leads.length + ' leads as CSV');
}
function importBackup(file) {
  if (!file) return;
  const r = new FileReader(); r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!d.state?.leads && !Array.isArray(d.leads)) throw Error('No leads found');
      if (!confirm('Import backup and replace local CRM data?')) return;
      state = d.state || { leads:d.leads, filter:'all' };
      if (d.settings) localStorage.setItem(SETTINGS, JSON.stringify(d.settings));
      if (d.account) localStorage.setItem(ACCOUNT, JSON.stringify(d.account));
      if (d.session) localStorage.setItem(SESSION, JSON.stringify(d.session));
      if (d.customer_accounts) localStorage.setItem(SUBS, JSON.stringify(d.customer_accounts));
      saveState(); renderAll(); toast('✓ Backup imported');
    } catch(e) { toast('Import failed: ' + e.message); }
  }; r.readAsText(file);
}
async function geocodePurchasedLead(query) {
  if (!query || query.trim().length < 5) return null;
  try {
    const r=await fetch(`https://geosearch.planninglabs.nyc/v2/search?text=${encodeURIComponent(query)}&size=1`);
    const d=await r.json(), f=d.features?.[0];
    if(f?.geometry?.coordinates) return {lng:+f.geometry.coordinates[0],lat:+f.geometry.coordinates[1]};
  } catch(e) {}
  return null;
}
function csvColumn(headers, names) {
  for(const n of names){const i=headers.indexOf(n); if(i>=0)return i;}
  for(const n of names){const i=headers.findIndex(h=>h.includes(n)); if(i>=0)return i;}
  return -1;
}
async function importCSV(file) {
  if (!file) return;
  const text=await file.text(), rows=parseCSV(text);
  if(rows.length<2){toast('CSV empty');return;}
  const h=rows[0].map(x=>x.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')), data=rows.slice(1);
  if(!confirm(`Import ${data.length} purchased leads? Missing coordinates will be geocoded from the address.`))return;
  const col={
    first:csvColumn(h,['first_name','firstname','first']), last:csvColumn(h,['last_name','lastname','surname','last']), full:csvColumn(h,['full_name','owner_name','name','owner']),
    addr:csvColumn(h,['property_address','site_address','street_address','address_1','address','street']), city:csvColumn(h,['city','borough','boro']), zip:csvColumn(h,['zip_code','zipcode','postal_code','zip']),
    phone:csvColumn(h,['cell_phone','mobile_phone','primary_phone','phone_number','phone','mobile','cell']), email:csvColumn(h,['email_address','email']), bill:csvColumn(h,['monthly_bill','electric_bill','utility_bill','avg_bill','bill']),
    lat:csvColumn(h,['latitude','lat']), lng:csvColumn(h,['longitude','lng','lon','long']), notes:csvColumn(h,['notes','comments','remarks']), source:csvColumn(h,['lead_source','vendor','source'])
  };
  const get=(row,k)=>col[k]>=0?(row[col[k]]||'').trim():'';
  const existing=new Set(state.leads.map(leadIdentityKey));
  const prog=document.getElementById('progress'),fill=document.getElementById('progFill'),sub=document.getElementById('progSub');
  prog.classList.add('open'); document.getElementById('progTitle').textContent='Importing purchased leads…'; loadCancelled=false;
  let added=0,dupes=0,failed=0; const newLeads=[];
  for(let i=0;i<data.length;i++){
    if(loadCancelled)break; const row=data[i], addr=get(row,'addr'),zip=get(row,'zip');
    if(!addr){failed++;continue;}
    let lat=parseFloat(get(row,'lat')),lng=parseFloat(get(row,'lng'));
    if(!Number.isFinite(lat)||!Number.isFinite(lng)){const g=await geocodePurchasedLead([addr,get(row,'city'),zip,'NY'].filter(Boolean).join(', ')); if(g){lat=g.lat;lng=g.lng;} else {failed++;continue;} await new Promise(r=>setTimeout(r,180));}
    const full=get(row,'full').split(/\s+/).filter(Boolean), first=get(row,'first')||full[0]||'', last=get(row,'last')||full.slice(1).join(' ')||'Purchased Lead';
    const vendor=get(row,'source'); const lead={id:'csv_'+Date.now().toString(36)+'_'+i,source:'imported',status:'fresh',first,last,addr:title(addr),boro:get(row,'city'),zip,phone:get(row,'phone'),email:get(row,'email'),monthly_bill:get(row,'bill'),lat,lng,notes:(vendor?`[${vendor}] `:'')+get(row,'notes'),assigned_agent:'',territory:get(row,'city')||settings().territory,updated_at:new Date().toISOString()};
    const key=leadIdentityKey(lead);if(existing.has(key)){dupes++;continue;}
    state.leads.push(lead);newLeads.push(lead);existing.add(key);added++; fill.style.width=Math.round((i+1)/data.length*100)+'%'; sub.textContent=`${added} added · ${dupes} duplicates · ${failed} skipped`;
  }
  saveState();renderAll();upsertBatch(newLeads);prog.classList.remove('open');toast(`✓ Imported ${added} purchased leads`);
}
function parseCSV(text) {
  const rows = []; let row = [], cur = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (c==='"' && q && n==='"') { cur+='"'; i++; continue; }
    if (c==='"') { q=!q; continue; }
    if (c===',' && !q) { row.push(cur); cur=''; continue; }
    if ((c==='\n'||c==='\r') && !q) { if (c==='\r'&&n==='\n') i++; row.push(cur); if (row.some(x=>x.trim())) rows.push(row); row=[]; cur=''; continue; }
    cur += c;
  }
  row.push(cur); if (row.some(x=>x.trim())) rows.push(row);
  return rows;
}

function stripeCheckout(planKey) {
  const plan = STRIPE_PLANS[planKey] || STRIPE_ANNUAL[planKey];
  if (!plan) return;
  const email = session()?.email || getBilling().billing_email || '';
  const params = new URLSearchParams();
  if (email) params.set('prefilled_email', email);
  params.set('client_reference_id', planKey);
  window.open(plan.link + '?' + params.toString(), '_blank');
}
function activateTrial() {
  const b = getBilling();
  if (b.plan_key && b.status === 'active') { toast('Plan already active — use Billing Portal to manage'); return; }
  const email = session()?.email || b.billing_email;
  if (!email) { toast('Log in first to start a trial'); return; }
  toast('Opening Stripe trial checkout…');
  fetch(SB_URL + '/functions/v1/create-checkout', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ email, plan_key:'team', name:session()?.name||email, trial:true }) })
    .then(r => r.json()).then(d => { if (d.url) window.open(d.url, '_blank'); else toast('Trial error: ' + (d.error||'Try again')); })
    .catch(() => toast('Network error'));
}

async function membershipForUser(user) {
  if (!sb || !user?.id) return null;
  const { data, error } = await sb.from('crm_team_members').select('team_id,role,display_name').eq('user_id', user.id).limit(1);
  if (error || !data?.length) return null;
  return data[0];
}
async function establishSecureSession(authSession) {
  const user=authSession?.user; if(!user)return false;
  const membership=await membershipForUser(user); if(!membership)return false;
  saveSession({ auth_v2:true, user_id:user.id, role:membership.role||'agent', name:membership.display_name||user.user_metadata?.name||user.email, email:user.email, team_id:membership.team_id });
  if (sb.realtime && authSession.access_token) sb.realtime.setAuth(authSession.access_token);
  return true;
}
async function initSecureAuth() {
  if(!sb?.auth)return false;
  const { data }=await sb.auth.getSession();
  if(data?.session && await establishSecureSession(data.session))return true;
  sb.auth.onAuthStateChange((_event,authSession)=>{ if(authSession) setTimeout(()=>establishSecureSession(authSession).then(ok=>{if(ok){syncFromSupabase();initRealtime();}}),0); });
  return false;
}
async function securePasswordLogin(email,password) {
  if(!sb?.auth || !email || password.length<6)return false;
  const { data,error }=await sb.auth.signInWithPassword({email,password});
  if(error || !data?.session)return false;
  if(!await establishSecureSession(data.session)){await sb.auth.signOut();return false;}
  return true;
}

lor:var(--muted)">/mo</div><div style="font-size:9px;color:var(--muted);margin-top:3px;line-height:1.2">${p.desc.split('·')[0].trim()}</div></div>`).join('')}</div><div class="form-row"><label>Your Name</label><input id="suName" placeholder="John Smith"></div><div class="form-row"><label>Company Name</label><input id="suCompany" placeholder="Acme Solar LLC"></div><div class="form-row"><label>Work Email</label><input id="suEmail" type="email" placeholder="you@company.com" autocomplete="email"></div><div class="form-row"><label>Choose a password (6+ characters)</label><input id="suPin" type="password" minlength="6" maxlength="72" placeholder="6+ characters"></div><button class="save-btn green" data-action="doSignup">Continue to Payment →</button></div><button class="save-btn secondary" data-action="closeLogin">Close</button><p class="sub" style="margin-top:10px">Already have an account? Switch to Master or Agent tab above.</p></div>`;

async function doLogin() {
  const email = val('loginEmail').toLowerCase(), pin = val('loginPin'), role = window._loginRole || 'master';
  setSyncDot('busy');
  // Supabase Auth is attempted first. Legacy PIN lookup remains during the
  // migration window so the original shared production data keeps working.
  if (await securePasswordLogin(email,pin)) {
    document.getElementById('loginOverlay').classList.remove('open'); toast('✓ Secure login');
    await syncFromSupabase(); syncBillingFromSupabase(); initRealtime(); subscribeLocations(); flushQueue();
    return;
  }
  const sbData = await sbLookup(email, pin, role);
  if (sbData) {
    saveSession({ role, name:sbData.name, email:sbData.email||email, team_id:sbData.team_id, pin });
    document.getElementById('loginOverlay').classList.remove('open');
    toast('✓ Logged in');
    await syncFromSupabase(); syncBillingFromSupabase(); initRealtime(); subscribeLocations();
    startTracking(); requestNotifPerm().then(scheduleCallbackNotifs); flushQueue();
    if (!getOb().seen) setTimeout(openOnboarding, 1200);
    if (window.posthog) posthog.identify(email, { name:sbData.name, role, plan:getBilling().plan_key||'none' });
    return;
  }
  const a = account();
  if (role === 'master') {
    if (a.master_pin && pin === a.master_pin && (!a.master_email || !email || email === String(a.master_email).toLowerCase())) {
      saveSession({ role:'master', name:a.master_name||'Shaquille', email:a.master_email||email });
      document.getElementById('loginOverlay').classList.remove('open');
      toast('✓ Logged in (local)'); setSyncDot('err'); return;
    }
    if (confirm('Master not found. Recover this browser as Master with the email/PIN entered? Only do this if you are the owner.')) {
      a.master_name = a.master_name || 'Shaquille'; a.master_email = email; a.master_pin = pin || '1234';
      saveAccount(a); saveSession({ role:'master', name:a.master_name, email });
      document.getElementById('loginOverlay').classList.remove('open');
      toast('✓ Master recovered'); return;
    }
    toast('Login not matched'); setSyncDot('err');
  } else {
    const ag = (a.agents||[]).find(x => String(x.email).toLowerCase() === email && String(x.pin) === pin);
    if (!ag) { toast('Agent login not found'); setSyncDot('err'); return; }
    saveSession({ role:'agent', name:ag.name, email:ag.email, id:ag.id, territory:ag.territory });
    document.getElementById('loginOverlay').classList.remove('open'); toast('✓ Agent logged in');
  }
}
async function doSignup() {
  const name = val('suName').trim(), company = val('suCompany').trim(), email = val('suEmail').trim().toLowerCase(), pin = val('suPin').trim(), plan_key = window._suPlan || 'team';
  if (!name || !email || !pin) { toast('Please fill in name, email and PIN'); return; }
  if (!/\S+@\S+\.\S+/.test(email)) { toast('Enter a valid email address'); return; }
  if (pin.length < 6) { toast('Password must be at least 6 characters'); return; }
  const btn = document.querySelector('[data-action="doSignup"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Creating account…'; }
  try {
    const res = await fetch(SB_URL + '/functions/v1/pre-register', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ name, company, email, pin, plan_key, ref:localStorage.getItem('m2_ref')||undefined }) });
    const data = await res.json();
    if (!res.ok || data.error) { toast('Signup error: ' + (data.error||res.statusText)); if (btn) { btn.disabled=false; btn.textContent='Continue to Payment →'; } return; }
    // Create the secure Auth identity in parallel with the existing billing
    // registration. A 6+ character password is required by Supabase Auth.
    if (sb?.auth && pin.length >= 6) {
      const authResult = await sb.auth.signUp({ email, password:pin, options:{ data:{ name, company } } });
      if (!authResult.error && authResult.data?.session) {
        const boot = await sb.rpc('bootstrap_crm_team', { company_name:company, member_name:name });
        if (!boot.error) await establishSecureSession(authResult.data.session);
      }
    }
    saveBilling({ billing_email:email, plan_key, status:'pending' });
    document.getElementById('loginOverlay').classList.remove('open');
    toast(data.existing ? 'Account found — opening payment…' : 'Account created — opening Stripe…');
    setTimeout(() => window.open(data.payment_url, '_blank'), 300);
  } catch(err) {
    console.error('doSignup:', err); toast('Network error — check connection and try again');
    if (btn) { btn.disabled=false; btn.textContent='Continue to Payment →'; }
  }
}

<script>
/* Bundled js/sms.js */
// ── SMS Blast ─────────────────────────────────────────────────────────────────
function openSMSBlast() {
  const s = session();
  if (!s.team_id) { toast('Log in as Master to use SMS Blast'); return; }
  if (!billingActive()) { toast('Active plan required for SMS Blast'); return; }
  const statusOpts = ['all','interested','callback','not_home','set','fresh','knocked'];
  const labels = { all:'All Active Leads', interested:'Interested', callback:'Callbacks', not_home:'Not Home', set:'Appointment Set', fresh:'Fresh / New', knocked:'Knocked' };
  modal('📱 SMS Blast', `<p class="sub" style="margin-bottom:12px">Send a text to multiple leads at once. Only leads with phone numbers receive it. Max 200 per blast.</p><div class="form-row"><label>Status Filter</label><select id="smsFilter" onchange="previewSMSCount()">${statusOpts.map(v=>`<option value="${v}">${labels[v]}</option>`).join('')}</select></div><div id="smsPreviewCount" class="sub" style="margin:8px 0;padding:8px;background:rgba(63,185,80,.07);border-radius:6px;display:none"></div><div class="form-row"><label>Message <span class="sub">(use {name} and {addr} for personalization)</span></label><textarea id="smsMsg" rows="5" placeholder="Hi {name}, this is ${settings().agent_name} from BlockBoss. Following up on solar savings for your home at {addr}. Call or text back when you have a moment. Reply STOP to opt out." maxlength="320" oninput="var cc=document.getElementById('smsCharCount');if(cc)cc.textContent=this.value.length+'/160 chars ('+Math.ceil(this.value.length/160)+' SMS segment'+((Math.ceil(this.value.length/160))>1?'s':'')+')';"></textarea><div id="smsCharCount" class="sub" style="text-align:right;font-size:11px;margin-top:4px">0/160 chars (1 SMS segment)</div></div><button class="save-btn green" data-action="doSMSBlast">Send SMS Blast →</button><p class="sub" style="font-size:10px;margin-top:8px;color:var(--muted)">By sending you confirm recipients have consented to SMS from your business.</p>`);
  setTimeout(() => previewSMSCount(), 80);
}

function previewSMSCount() {
  const f = document.getElementById('smsFilter')?.value || 'all';
  const pc = document.getElementById('smsPreviewCount'); if (!pc) return;
  const s = session(); if (!s.team_id) return;
  pc.style.display = 'block'; pc.textContent = 'Counting leads…';
  fetch(SB_URL + '/functions/v1/bulk-sms', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ team_id:s.team_id, status_filter:f, message:'x', preview_only:true }) })
    .then(r => r.json())
    .then(d => {
      if (d.count !== undefined) {
        pc.textContent = '📱 ' + d.count + ' lead' + (d.count===1?'':'s') + ' with phone numbers will receive this message';
        pc.style.background = d.count > 0 ? 'rgba(63,185,80,.07)' : 'rgba(240,136,62,.07)';
      } else pc.textContent = 'Preview unavailable';
    })
    .catch(() => { pc.textContent = 'Preview unavailable (Twilio may not be configured yet)'; });
}

async function doSMSBlast() {
  const f = val('smsFilter') || 'all';
  const rawMsg = val('smsMsg').trim();
  if (!rawMsg) { toast('Enter a message first'); return; }
  if (rawMsg.length > 320) { toast('Message too long (max 320 chars)'); return; }
  const s = session(); if (!s.team_id) { toast('Log in as Master to send blasts'); return; }
  const btn = document.querySelector('[data-action="doSMSBlast"]');
  if (btn) { btn.disabled=true; btn.textContent='Sending…'; }
  try {
    const r = await fetch(SB_URL + '/functions/v1/bulk-sms', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ team_id:s.team_id, status_filter:f, message:rawMsg }) });
    const d = await r.json();
    if (d.error) { toast('SMS Blast error: ' + d.error); if (btn) { btn.disabled=false; btn.textContent='Send SMS Blast →'; } return; }
    closeModal(); toast('✓ ' + d.sent + ' messages sent!' + (d.failed?' ('+d.failed+' failed)':''));
  } catch(err) { toast('Network error — check connection'); if (btn) { btn.disabled=false; btn.textContent='Send SMS Blast →'; } }
}

</script>

// ── Main Action Dispatcher ────────────────────────────────────────────────────
function parseAction(e) {
  const a = e.target.closest('[data-action], [data-tool], [data-disp], [data-after], [data-lead-action], [data-open], [data-login-role], [data-agent-tab]');
  if (!a) return;
  const act = a.dataset.action || a.dataset.tool || a.dataset.leadAction;
  e.preventDefault(); e.stopPropagation();

  if (a.dataset.loginRole) {
    window._loginRole = a.dataset.loginRole;
    document.querySelectorAll('[data-login-role]').forEach(b => b.classList.toggle('active', b === a));
    const ls = document.getElementById('loginSection'), ss = document.getElementById('signupSection');
    if (ls && ss) { const su = a.dataset.loginRole === 'signup'; ls.style.display = su ? 'none' : ''; ss.style.display = su ? '' : 'none'; }
    return;
  }
  if (a.dataset.agentTab) {
    document.querySelectorAll('[data-agent-tab]').forEach(b => b.classList.toggle('active', b === a));
    const m = document.getElementById('agManual'), i = document.getElementById('agInvite');
    if (m && i) { const inv = a.dataset.agentTab === 'invite'; m.style.display = inv ? 'none' : ''; i.style.display = inv ? '' : 'none'; }
    return;
  }
  if (a.dataset.after) {
    localStorage.setItem(AFTER, a.dataset.after);
    document.querySelectorAll('[data-after]').forEach(b => b.classList.toggle('active', b === a));
    toast('After action updated'); return;
  }

  // Disposition tap
  if (a.dataset.disp) {
    const l = state.leads.find(x => x.id === currentLeadId); if (!l) return;
    l.status = a.dataset.disp; l.sun_score = sunScore(l);
    addLog(l, a.dataset.disp, `${LABEL[a.dataset.disp]} saved`);
    saveState(); upsertLead(l);
    if (window.posthog) posthog.capture('lead_status_changed', { status:l.status, addr:l.addr });
    // Appointment confirmation SMS/email
    if (l.status === 'set' && (l.phone || l.email) && sb && session().team_id) {
      const _sg = settings();
      fetch(SB_URL + '/functions/v1/send-appt-confirm', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ lead_phone:l.phone||'', lead_email:l.email||'', lead_name:(l.first||'')+' '+(l.last||''), lead_addr:l.addr||'', rep_name:agentName(), appt_time:l.appt_time||'', company_name:_sg.company||'BlockBoss CRM' }) }).catch(() => {});
    }
    a.classList.add('saved'); a.innerHTML = '<div class="qd-ico">✓</div><div class="qd-label">Saved</div>';
    toast(`✓ ${LABEL[l.status]}`); renderAll();
    const after = localStorage.getItem(AFTER) || 'next';
    if (after === 'next') setTimeout(() => { closeSheet(); goLead(nextBestLead()); }, 420);
    else if (after === 'close') setTimeout(closeSheet, 420);
    else setTimeout(() => openLead(l.id), 420);
    return;
  }
  if (a.dataset.open) { closeModal(); goLead(state.leads.find(x => x.id === a.dataset.open)); return; }

  // Named actions
  if (act === 'closeModal') closeModal();
  else if (act === 'closeLogin') document.getElementById('loginOverlay').classList.remove('open');
  else if (act === 'openLogin') openLogin();
  else if (act === 'doLogin') doLogin();
  else if (act === 'doSignup') doSignup();
  else if (act === 'openPinReset') openPinReset();
  else if (act === 'doPinReset') doPinReset();
  else if (act === 'doInviteAgent') doInviteAgent();
  else if (act === 'doAcceptInvite') doAcceptInvite();
  else if (act === 'demoMode') demoMode();
  else if (act === 'openLaunch') launch();
  else if (act === 'openAgentSetup') openAgentSetup();
  else if (act === 'saveAgent') saveAgent();
  else if (act === 'assignAgent') assignToAgent(a.dataset.id);
  else if (act === 'assignVisible') assignVisible();
  else if (act === 'loginAsAgent') { const ag = account().agents.find(x => x.id === a.dataset.id); if (ag) saveSession({ role:'agent', name:ag.name, email:ag.email, id:ag.id, territory:ag.territory }); }
  else if (act === 'logout') { localStorage.removeItem(SESSION); openLogin(); }
  else if (act === 'saveSettings') saveSettingsForm();
  else if (act === 'copyReferral') copyReferralLink();
  else if (act === 'openBranding') openBranding();
  else if (act === 'saveBranding') saveBrandingForm();
  else if (act === 'hpdView') enrichWithHPD('view');
  else if (act === 'hpdAll') enrichWithHPD('all');
  else if (act === 'acrisView') enrichWithACRIS('view');
  else if (act === 'acrisAll') enrichWithACRIS('all');
  else if (act === 'openCustomer') openCustomer();
  else if (act === 'saveCustomer') saveCustomer();
  else if (act === 'openContact') openContact();
  else if (act === 'saveContact') saveContactForm();
  else if (act === 'exportBackup') exportBackup();
  else if (act === 'exportCSV') exportCSV();
  else if (act === 'openLeaderboard') openLeaderboard();
  else if (act === 'resetData') { if (confirm('Reset all local leads?')) { state={leads:[],filter:'all'}; saveState(); renderAll(); } }
  else if (act === 'repMode' || act === 'today') repMode();
  else if (act === 'next' || act === 'nextBest') goLead(nextBestLead());
  else if (act === 'locate') locate();
  else if (act === 'satellite') toggleSatellite();
  else if (act === 'walk' || act === 'route') optimizeRoute();
  else if (act === 'clearroute') clearRoute();
  else if (act === 'livetrack') startTracking();
  else if (act === 'fit' || act === 'fitLeads') fitLeads();
  else if (act === 'add') openCreate();
  else if (act === 'loadArea') { const b = map.getBounds(); loadPlutoBounds([b.getSouth(),b.getWest(),b.getNorth(),b.getEast()], 'current map area'); }
  else if (act === 'neighborhoods') neighborhoods();
  else if (act === 'loadNbh') { const n = NEIGHBORHOODS[a.dataset.boro][+a.dataset.i]; map.fitBounds([[n[1][0],n[1][1]],[n[1][2],n[1][3]]]); closeModal(); loadPlutoBounds(n[1], n[0]); }
  else if (act === 'createLead') createLead(a);
  else if (act === 'knockNow') {
    const l = state.leads.find(x => x.id === currentLeadId); if (!l) return;
    l.status = 'knocked'; l.sun_score = sunScore(l); addLog(l, 'knocked', 'Knocked at door');
    saveState(); upsertLead(l);
    if (window.posthog) posthog.capture('lead_knocked', { addr:l.addr, boro:l.boro, sun_score:l.sun_score });
    toast('✊ Knocked'); openLead(l.id);
  }
  else if (act === 'saveDetails') { const l = state.leads.find(x => x.id === currentLeadId); if (l) saveLeadDetails(l); }
  else if (act === 'deleteLead') {
    if (confirm('Delete this lead?')) { const _did = currentLeadId; state.leads = state.leads.filter(x => x.id !== _did); saveState(); deleteLeadRemote(_did); closeSheet(); renderAll(); }
  }
  else if (act === 'handoff') { const l = state.leads.find(x => x.id === currentLeadId); const msg = `Solar/HVAC Appt Lead: ${nameOf(l)}\n${l.addr||''}\nPhone: ${l.phone||''}\nBill: ${l.monthly_bill||''}\nNotes: ${l.notes||''}`; location.href = 'sms:?body=' + encodeURIComponent(msg); }
  else if (act === 'toggleSales') { document.body.classList.toggle('sales-demo-on'); renderStats(); }
  else if (act === 'salesOff') { document.body.classList.remove('sales-demo-on'); renderStats(); }
  else if (act === 'openOnboarding') openOnboarding();
  else if (act === 'openBilling') openBilling();
  else if (act === 'stripeCheckout') stripeCheckout(a.dataset.plan);
  else if (act === 'activateTrial') activateTrial();
  else if (act === 'openBillingPortal') {
    const email = session()?.email || getBilling().billing_email;
    if (!email) { toast('Log in first to access billing portal'); return; }
    toast('Opening billing portal…');
    fetch(SB_URL + '/functions/v1/billing-portal', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY}, body:JSON.stringify({ email }) })
      .then(r => r.json()).then(d => { if (d.url) window.open(d.url, '_blank'); else toast('Billing portal: ' + (d.error||'not available — subscribe first')); })
      .catch(() => toast('Could not open billing portal'));
  }
  else if (act === 'saveBillingManual') {
    const pk=val('bpPlanKey'), st=val('bpStatus'), en=val('bpEnd'), em=val('bpEmail');
    if (!STRIPE_PLANS[pk] && pk) return toast('Plan key must be: solo, team, or agency');
    saveBilling({ plan_key:pk||getBilling().plan_key, status:st||getBilling().status, period_end:st!=='trial'?en:getBilling().period_end, trial_end:st==='trial'?en:getBilling().trial_end, billing_email:em });
    renderBrand(); closeModal(); toast('✓ Billing state saved'); renderStats();
  }
  else if (act === 'openSMSBlast') openSMSBlast();
  else if (act === 'doSMSBlast') doSMSBlast();
  else if (act === 'pricing') pricing();
  else if (act === 'valueCalc') valueCalc();
  else if (act === 'calcValue') calcValue();
  else if (act === 'landingPreview') landingPreview();
  else if (act === 'runTest') runTest();
  else if (act === 'markInstall') { const c = checks(); c.install=true; saveChecks(c); toast('✓ App install marked'); renderStats(); }
  else if (act === 'copyChecklist') copyText('BlockBoss CRM Test Checklist: login, map, leads, agent assignment, dispositions, Save & Next, PLUTO load, backup, customer accounts, sales demo.', 'Checklist copied');
  else if (act === 'copyPlan') copyText(`${settings().company||'BlockBoss CRM'} account summary: Plan ${settings().plan||'Growth'}, Leads ${state.leads.length}, Agents ${(account().agents||[]).length}.`, 'Plan summary copied');
  else if (act === 'copyPitch') copyText('BlockBoss CRM helps solar/HVAC teams work from a smart map, load NYC homeowner names, prioritize high-sun homes, assign reps, track follow-ups, and manage daily production. Want to see a quick demo?', 'Pitch copied');
  else if (act === 'copyFollowup') copyText('Following up on BlockBoss CRM — it gives reps a field app and managers lead assignment, follow-up boards, performance scorecards, backups, and sales/demo tools.', 'Follow-up copied');
  else if (act === 'copyContact') { const c = contact(); copyText(`${c.name}\n${c.phone}\n${c.email}\n${c.booking}\n${c.cta}`, 'Contact copied'); }
  else if (act === 'copyLanding') copyText('BlockBoss CRM — smart map, PLUTO homeowner names, sun score, big dispositions, rep mode, customer accounts, manager dashboard, backups, and sales demo tools.', 'Landing text copied');
  else if (act === 'switchList') { closeModal(); switchView('list'); }
}

</script>
<script>
/* Bundled js/app.js */
// ── Event Listeners & Init ────────────────────────────────────────────────────
document.addEventListener('click', parseAction, true);

document.getElementById('filterToggle').onclick = e => { e.stopPropagation(); document.getElementById('filterBar').classList.toggle('open'); };
document.getElementById('fieldToggle').onclick  = e => { e.stopPropagation(); document.getElementById('fieldMenu').classList.toggle('open'); };
document.addEventListener('click', e => {
  if (!e.target.closest('#fieldMenu,#fieldToggle')) document.getElementById('fieldMenu').classList.remove('open');
  if (!e.target.closest('#filterBar,#filterToggle')) document.getElementById('filterBar').classList.remove('open');
});

document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => switchView(b.dataset.view));

document.getElementById('closeSheet').onclick   = closeSheet;
document.getElementById('sheetHandle').onclick  = closeSheet;
document.getElementById('nextBestPill').onclick = () => goLead(nextBestLead());
document.getElementById('openLogin').onclick    = openLogin;
document.getElementById('openLaunch').onclick   = launch;
document.getElementById('exportTop').onclick    = exportBackup;
document.getElementById('cancelLoad').onclick   = () => loadCancelled = true;

document.addEventListener('change', e => {
  if (e.target.id === 'backupFile') importBackup(e.target.files[0]);
  if (e.target.id === 'csvFile')    importCSV(e.target.files[0]);
});

// ── Map Interactions ──────────────────────────────────────────────────────────
map.on('click', e => {
  if (draftMarker) draftMarker.remove();
  draftMarker = L.marker(e.latlng, {
    icon: L.divIcon({ className:'', html:`<div class="dot-pin dot-cold dot-selected"></div>`, iconSize:[34,34], iconAnchor:[17,17] })
  }).addTo(map).bindPopup('<b>New lead location</b><br><button onclick="window._openCreateFromDraft()">Add lead here</button>').openPopup();
  window._draftLatLng = e.latlng;
});
window._openCreateFromDraft = () => openCreate(window._draftLatLng);

function updateLabelViz() { document.getElementById('map').classList.toggle('show-prop-labels', map.getZoom() >= 17); }
map.on('zoomend', updateLabelViz);
let _viewportRenderTimer=null;
map.on('moveend',()=>{clearTimeout(_viewportRenderTimer);_viewportRenderTimer=setTimeout(renderMarkers,120);});
updateLabelViz();

// ── Initial Render & Sync ─────────────────────────────────────────────────────
renderAll();
(async()=>{
  const restored = typeof hydrateLeadsFromIndexedDB === 'function' ? await hydrateLeadsFromIndexedDB() : 0;
  if (restored) renderAll();
  await initSecureAuth();
  if (!state.leads.length) info('Tap Field Tools → Neighborhoods or Load Area to load NYC owner-name sun pins.');
  if (session().team_id) { await syncFromSupabase(); syncBillingFromSupabase(); initRealtime(); subscribeLocations(); flushQueue(); }
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

// ── URL Param Handlers ────────────────────────────────────────────────────────

// ?verified=1 — email verified redirect
(() => {
  const vf = new URLSearchParams(location.search).get('verified');
  if (vf) {
    history.replaceState({}, '', location.pathname);
    localStorage.setItem('m2_verified', '1');
    setTimeout(() => toast('✅ Email verified — you\'re all set!'), 400);
  }
})();

// ?invite_token=UUID — agent invite link
(() => {
  const it = new URLSearchParams(location.search).get('invite_token');
  if (it) { history.replaceState({}, '', location.pathname); setTimeout(() => showAcceptInvite(it), 500); }
})();

// ?plan=solo|team|agency — pricing CTA
(() => {
  const pp = new URLSearchParams(location.search).get('plan');
  if (!pp || !STRIPE_PLANS[pp]) return;
  history.replaceState({}, '', location.pathname);
  window._suPlan = pp;
  if (session() && session().role) {
    setTimeout(() => openBilling(), 400);
  } else {
    setTimeout(() => {
      openLogin();
      window._suPlan = pp;
      setTimeout(() => {
        const bt = document.querySelector('[data-login-role="signup"]');
        if (bt) bt.click();
        setTimeout(() => { const el = document.querySelector('[data-su-plan="'+pp+'"]'); if (el) el.click(); }, 80);
      }, 250);
    }, 400);
  }
})();

// ?billing_success=solo|team|agency  +  ?ref=CODE — Stripe redirect
(() => {
  const params = new URLSearchParams(location.search);
  const pk = params.get('billing_success');
  const _refParam = params.get('ref');
  if (_refParam) localStorage.setItem('m2_ref', _refParam.toUpperCase());
  if (pk && STRIPE_PLANS[pk]) {
    saveBilling({ plan_key:pk, status:'active', period_end:new Date(Date.now()+30*86400000).toISOString().slice(0,10) });
    history.replaceState({}, '', location.pathname);
    renderBrand(); renderStats();
    setTimeout(() => {
      toast('🎉 Subscription activated — ' + STRIPE_PLANS[pk].label + ' plan is live!');
      if (!session()?.role) setTimeout(() => { openLogin(); toast('Log in with your email and PIN to get started'); }, 1400);
    }, 600);
  }
})();

// ── PWA Install Banner ────────────────────────────────────────────────────────
var _installPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _installPrompt = e;
  if (!window.matchMedia('(display-mode: standalone)').matches && !localStorage.getItem('m2_pwa_dismissed')) {
    setTimeout(showInstallBanner, 5000);
  }
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  var d = document.createElement('div');
  d.id = 'installBanner';
  d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:2px solid rgba(88,166,255,.3);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:99999;box-shadow:0 -4px 24px rgba(0,0,0,.5)';
  d.innerHTML = '<div style="flex:1"><b style="font-size:13px">Add BlockBoss CRM to Home Screen</b><br><span style="font-size:11px;color:#8b949e">Works offline · Full screen · Instant access</span></div><button onclick="installApp()" style="background:#238636;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer">+ Install</button><button onclick="localStorage.setItem(\'m2_pwa_dismissed\',\'1\');document.getElementById(\'installBanner\').remove()" style="background:transparent;color:#8b949e;border:none;cursor:pointer;font-size:22px;padding:0 4px">×</button>';
  document.body.appendChild(d);
}

async function installApp() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  const r = await _installPrompt.userChoice;
  _installPrompt = null;
  const b = document.getElementById('installBanner');
  if (b) b.remove();
  if (r.outcome === 'accepted') { localStorage.setItem('m2_pwa_dismissed', '1'); toast('✓ BlockBoss CRM added to home screen'); }
}

window.addEventListener('appinstalled', function() {
  const b = document.getElementById('installBanner');
  if (b) b.remove();
});

</script>
</body>
</html>
